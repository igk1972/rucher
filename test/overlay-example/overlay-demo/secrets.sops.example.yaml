# secrets.sops.example.yaml — PLAINTEXT-ШАБЛОН. НЕ коммитить с настоящим ключом!
#
# Это только образец формата. Реальный tailscale authkey зашифруй на age-recipient
# ЭТОГО compartment'а в файл secrets.sops.yaml — и коммить именно зашифрованный вариант.
#
#   pecm age recipient overlay-demo            # -> age1... recipient этого compartment'а
#   printf 'ts-authkey: tskey-auth-XXXXXXXXXX\n' \
#     | sops --encrypt --input-type yaml --output-type yaml --age <recipient> /dev/stdin \
#     > secrets.sops.yaml
#
# --input-type yaml обязателен, иначе sops завернёт весь ввод в один ключ data.
#
# Ключ бери в админке tailscale (Settings -> Keys -> Auth keys). Удобно взять
# reusable + pre-approved (ephemeral — на выбор), чтобы сайдкар регистрировался без ручного
# одобрения ноды в тайнете.

ts-authkey: tskey-auth-REPLACE-ME-with-a-real-tailscale-authkey
