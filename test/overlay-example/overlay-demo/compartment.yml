# compartment.yml — overlay compartment demo (L3 mesh via tailscale sidecar)
name: overlay-demo
secrets:
  from: secrets.sops.yaml   # keys from this SOPS file (defaults to secrets.sops.yaml)
  create:
    - ts-authkey            # only this key becomes a podman secret;
                            # overlay-ts.container references it via Secret=ts-authkey
