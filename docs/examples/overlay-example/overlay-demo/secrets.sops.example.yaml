# secrets.sops.example.yaml — PLAINTEXT TEMPLATE. Do NOT commit with a real key!
#
# This is only a sample of the format. Encrypt the real tailscale authkey for the age recipient
# of THIS cadre into the file secrets.sops.yaml — and commit exactly that encrypted variant.
#
#   rucher node cadre recipient overlay-demo     # -> age1... recipient of this cadre
#   printf 'ts-authkey: <your-tailscale-authkey>\n' \
#     | sops --encrypt --input-type yaml --output-type yaml --age <recipient> /dev/stdin \
#     > secrets.sops.yaml
#
# --input-type yaml is required, otherwise sops wraps the whole input into a single data key.
#
# Get the key from the tailscale admin console (Settings -> Keys -> Auth keys). It's convenient
# to use reusable + pre-approved (ephemeral optional) so the sidecar registers without manually
# approving the node on the tailnet.

ts-authkey: REPLACE-ME-with-a-real-tailscale-authkey
